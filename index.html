<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>DG Equipment v2</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0f0f0f;--sf:#1a1a1a;--sf2:#222;--sf3:#2a2a2a;
  --bd:#2e2e2e;--bd2:#3a3a3a;
  --tx:#f0ede8;--tx2:#a09c96;--tx3:#6a6660;
  --red:#e85d3a;--red2:#c44a2a;--grn:#3ab87a;--amb:#e8a83a;--blu:#3a8fe8;--pur:#8b5cf6;
  --r:12px;--rs:8px;--fn:'DM Sans',sans-serif;--mo:'DM Mono',monospace;
}
html.light{
  --bg:#f5f3ef;--sf:#fff;--sf2:#f0ede8;--sf3:#e8e4de;
  --bd:#ddd9d3;--bd2:#ccc8c2;--tx:#1a1814;--tx2:#5a5650;--tx3:#9a9690;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:var(--fn);background:var(--bg);color:var(--tx);min-height:100vh;overflow-x:hidden}
/* screens */
.scr{display:none;min-height:100vh;flex-direction:column}
.scr.on{display:flex}
/* header */
.hdr{position:sticky;top:0;z-index:50;background:var(--bg);border-bottom:1px solid var(--bd);
  height:56px;padding:0 14px;display:flex;align-items:center;justify-content:space-between;gap:10px;flex-shrink:0}
.hdr-l{display:flex;align-items:center;gap:8px;min-width:0;overflow:hidden}
.hdr-r{display:flex;align-items:center;gap:6px;flex-shrink:0}
.logo{font-size:15px;font-weight:700;display:flex;align-items:center;gap:7px}
.logo-dot{width:8px;height:8px;background:var(--red);border-radius:50%}
.back{background:var(--sf2);border:1px solid var(--bd2);color:var(--tx2);border-radius:var(--rs);
  padding:7px 11px;font-size:13px;font-family:var(--fn);cursor:pointer;white-space:nowrap}
.back:active{opacity:.7}
.htitle{font-size:15px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:160px}
.hsub{font-size:11px;color:var(--tx3);font-family:var(--mo)}
.ibtn{background:var(--sf2);border:1px solid var(--bd);color:var(--tx2);border-radius:var(--rs);
  width:36px;height:36px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;flex-shrink:0}
.ibtn:active{opacity:.7}
.pbtn{background:var(--red);color:#fff;border:none;border-radius:var(--rs);padding:9px 16px;
  font-size:14px;font-weight:700;font-family:var(--fn);cursor:pointer;white-space:nowrap}
.pbtn:active{background:var(--red2)}
.pbtn:disabled{opacity:.5;pointer-events:none}
/* scrollable body */
.body{flex:1;overflow-y:auto;padding-bottom:80px}
/* search */
.sw{position:relative}
.sinp{width:100%;background:var(--sf2);border:1.5px solid var(--bd2);border-radius:var(--r);
  padding:11px 40px 11px 14px;color:var(--tx);font-family:var(--fn);font-size:14px;outline:none;transition:border-color .15s}
.sinp::placeholder{color:var(--tx3)}
.sinp:focus{border-color:var(--red)}
.sico{position:absolute;right:13px;top:50%;transform:translateY(-50%);color:var(--tx3);font-size:16px;pointer-events:none}
/* dropdown */
.dd{position:absolute;top:calc(100% + 4px);left:0;right:0;background:var(--sf);border:1px solid var(--bd2);
  border-radius:var(--r);z-index:200;max-height:260px;overflow-y:auto;box-shadow:0 8px 24px rgba(0,0,0,.4)}
.ddi{padding:11px 14px;cursor:pointer;border-bottom:1px solid var(--bd)}
.ddi:last-child{border-bottom:none}
.ddi:active{background:var(--sf2)}
.ddi-n{font-size:14px;font-weight:500}
.ddi-s{font-size:12px;color:var(--tx3);font-family:var(--mo);margin-top:2px}
.dd-add{padding:11px 14px;cursor:pointer;color:var(--red);font-size:14px;font-weight:600;border-top:1px solid var(--bd)}
.dd-add:active{opacity:.7}
.dd-mt{padding:12px 14px;color:var(--tx3);font-size:13px;text-align:center}
/* section */
.sec{border-bottom:1px solid var(--bd);padding:14px 16px}
.slbl{font-size:10px;font-weight:700;letter-spacing:.09em;text-transform:uppercase;color:var(--tx3);margin-bottom:10px}
.sublbl{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--tx3);margin-bottom:6px}
/* chips */
.crow{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch}
.crow::-webkit-scrollbar{display:none}
.chip{flex-shrink:0;padding:7px 14px;border-radius:20px;font-size:13px;font-weight:600;
  border:1.5px solid var(--bd2);background:var(--sf2);color:var(--tx3);cursor:pointer;white-space:nowrap;font-family:var(--fn)}
.chip.on{border-color:transparent}
/* status chip colours */
.chip[data-s="New"].on{background:rgba(232,93,58,.18);color:var(--red);border-color:var(--red)}
.chip[data-s="Looked At"].on{background:rgba(58,143,232,.18);color:var(--blu);border-color:var(--blu)}
.chip[data-s="Parts Ordered"].on{background:rgba(232,168,58,.18);color:var(--amb);border-color:var(--amb)}
.chip[data-s="Parts In"].on{background:rgba(139,92,246,.18);color:var(--pur);border-color:var(--pur)}
.chip[data-s="Done"].on{background:rgba(58,184,122,.18);color:var(--grn);border-color:var(--grn)}
.chip[data-s="Invoiced"].on{background:rgba(58,184,122,.12);color:var(--grn);border-color:var(--grn)}
/* filter chip colours */
.fchip{flex-shrink:0;padding:6px 13px;border-radius:20px;font-size:12px;font-weight:600;
  border:1.5px solid var(--bd2);background:var(--sf2);color:var(--tx3);cursor:pointer;white-space:nowrap;font-family:var(--fn);
  display:flex;align-items:center;gap:5px}
.fchip .cnt{font-size:10px;background:var(--sf3);color:var(--tx3);border-radius:10px;padding:1px 5px;font-family:var(--mo)}
.fchip.on{border-color:transparent}
.fchip[data-f="all"].on{background:var(--sf3);color:var(--tx);border-color:var(--bd2)}
.fchip[data-f="New"].on{background:rgba(232,93,58,.18);color:var(--red);border-color:var(--red)}
.fchip[data-f="Looked At"].on{background:rgba(58,143,232,.18);color:var(--blu);border-color:var(--blu)}
.fchip[data-f="Parts Ordered"].on{background:rgba(232,168,58,.18);color:var(--amb);border-color:var(--amb)}
.fchip[data-f="Parts In"].on{background:rgba(139,92,246,.18);color:var(--pur);border-color:var(--pur)}
.fchip[data-f="Done"].on{background:rgba(58,184,122,.18);color:var(--grn);border-color:var(--grn)}
.fchip[data-f="Invoiced"].on{background:rgba(58,184,122,.12);color:var(--grn);border-color:var(--grn)}
/* category chips */
.ccat{flex-shrink:0;padding:6px 13px;border-radius:20px;font-size:12px;font-weight:600;
  border:1.5px solid var(--bd2);background:var(--sf2);color:var(--tx3);cursor:pointer;white-space:nowrap;font-family:var(--fn)}
.ccat.on{background:rgba(232,93,58,.18);color:var(--red);border-color:var(--red)}
/* fields */
.fg{display:flex;gap:10px}
.fc{flex:1;display:flex;flex-direction:column;gap:5px}
.flbl{font-size:11px;color:var(--tx3);font-weight:500}
.fi{width:100%;background:var(--sf2);border:1.5px solid var(--bd2);border-radius:var(--rs);
  padding:10px 12px;color:var(--tx);font-family:var(--fn);font-size:14px;outline:none;transition:border-color .15s;-webkit-appearance:none}
.fi:focus{border-color:var(--red)}
.fi::placeholder{color:var(--tx3)}
.fi option{background:var(--sf)}
.dta{width:100%;background:var(--sf2);border:1.5px solid var(--bd2);border-radius:var(--r);
  padding:11px 14px;color:var(--tx);font-family:var(--fn);font-size:14px;outline:none;resize:none;
  min-height:68px;transition:border-color .15s}
.dta:focus{border-color:var(--red)}
.dta::placeholder{color:var(--tx3)}
/* customer selected */
.csel{display:flex;align-items:center;gap:10px;background:var(--sf2);border:1.5px solid var(--bd2);
  border-radius:var(--r);padding:11px 14px;cursor:pointer}
.csel:active{opacity:.8}
.cav{width:34px;height:34px;background:var(--red);border-radius:50%;display:flex;align-items:center;
  justify-content:center;font-size:13px;font-weight:700;color:#fff;flex-shrink:0}
.cnm{font-size:14px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cmt{font-size:12px;color:var(--tx3);font-family:var(--mo)}
.badge{font-size:10px;font-weight:600;padding:3px 8px;border-radius:20px;background:var(--sf3);color:var(--tx2);white-space:nowrap}
.badge.biz{background:rgba(232,93,58,.15);color:var(--red)}
.badge.exmt{background:rgba(58,184,122,.15);color:var(--grn)}
/* machines */
.mc{background:var(--sf);border:1.5px solid var(--bd2);border-radius:var(--r);overflow:hidden;margin-bottom:10px}
.mc.pri{border-color:rgba(232,93,58,.45)}
.mc-hd{padding:12px 13px;display:flex;align-items:center;gap:10px;cursor:pointer;background:var(--sf2);user-select:none}
.mc-hd:active{opacity:.8}
.mc-ico{width:36px;height:36px;background:var(--sf3);border-radius:var(--rs);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.mc-inf{flex:1;min-width:0}
.mc-nm{font-size:14px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.mc-sn{font-size:11px;color:var(--tx3);font-family:var(--mo);margin-top:1px}
.mc-rt{display:flex;align-items:center;gap:7px;flex-shrink:0}
.mc-amt{font-size:12px;font-family:var(--mo);color:var(--tx2)}
.mc-rm{background:none;border:none;color:var(--tx3);cursor:pointer;font-size:18px;padding:3px;line-height:1;font-family:var(--fn)}
.mc-rm:active{color:var(--red)}
.mc-cv{font-size:11px;color:var(--tx3);transition:transform .2s}
.mc-cv.op{transform:rotate(180deg)}
.mc-bd{padding:14px;display:flex;flex-direction:column;gap:14px}
/* line items */
.lil{display:flex;flex-direction:column;gap:6px}
.li{display:flex;align-items:flex-start;gap:8px;background:var(--sf2);border:1px solid var(--bd);border-radius:var(--rs);padding:9px 10px}
.li-d{font-size:13px;color:var(--tx);flex:1;min-width:0;white-space:pre-line;word-break:break-word}
.li-s{font-size:11px;color:var(--tx3);font-family:var(--mo);margin-top:2px}
.li-a{font-size:13px;font-weight:600;font-family:var(--mo);white-space:nowrap;flex-shrink:0}
.li-rm{background:none;border:none;color:var(--tx3);cursor:pointer;font-size:15px;padding:2px 4px;flex-shrink:0;font-family:var(--fn)}
.li-rm:active{color:var(--red)}
.abtn{width:100%;background:var(--sf2);border:1.5px dashed var(--bd2);border-radius:var(--rs);
  padding:10px;color:var(--tx3);font-size:13px;font-weight:600;font-family:var(--fn);cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:5px;margin-top:6px}
.abtn:active{border-color:var(--red);color:var(--red)}
.mc-sub{display:flex;justify-content:flex-end;align-items:center;gap:8px;padding-top:8px;border-top:1px solid var(--bd)}
.mc-sub-l{font-size:12px;color:var(--tx3)}
.mc-sub-a{font-size:15px;font-weight:600;font-family:var(--mo)}
.amc{width:100%;background:transparent;border:1.5px dashed var(--bd2);border-radius:var(--r);
  padding:14px;color:var(--tx3);font-size:14px;font-weight:600;font-family:var(--fn);cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:6px;margin-top:10px}
.amc:not(:disabled):active{border-color:var(--red);color:var(--red)}
.amc:disabled{opacity:.35;cursor:not-allowed}
/* inline form */
.inf{background:var(--sf);border:1.5px solid var(--red);border-radius:var(--r);
  padding:13px;display:flex;flex-direction:column;gap:9px;margin-top:8px;animation:sli .15s ease}
@keyframes sli{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
.inf-t{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--red)}
.ifr{display:flex;gap:8px}
.ii{flex:1;background:var(--sf2);border:1.5px solid var(--bd2);border-radius:var(--rs);
  padding:10px 11px;color:var(--tx);font-family:var(--fn);font-size:14px;outline:none;transition:border-color .15s;min-width:0}
.ii:focus{border-color:var(--red)}
.ii::placeholder{color:var(--tx3)}
.ii option{background:var(--sf)}
.infb{display:flex;gap:8px}
.inf-c{flex:1;background:var(--sf2);border:1px solid var(--bd2);border-radius:var(--rs);
  padding:10px;color:var(--tx2);font-size:14px;font-family:var(--fn);cursor:pointer}
.inf-c:active{opacity:.7}
.inf-o{flex:2;background:var(--red);border:none;border-radius:var(--rs);padding:10px;
  color:#fff;font-size:14px;font-weight:700;font-family:var(--fn);cursor:pointer}
.inf-o:active{background:var(--red2)}
/* parts autocomplete */
.pw{position:relative}
.pdrop{position:absolute;top:calc(100% + 3px);left:0;right:0;background:var(--sf);
  border:1px solid var(--bd2);border-radius:var(--r);z-index:300;max-height:200px;overflow-y:auto;
  box-shadow:0 8px 24px rgba(0,0,0,.5);display:none}
.pdrop.op{display:block}
.pi{padding:10px 12px;cursor:pointer;border-bottom:1px solid var(--bd);display:flex;justify-content:space-between;align-items:center;gap:8px}
.pi:last-child{border-bottom:none}
.pi:active{background:var(--sf2)}
.pi-n{font-size:13px;font-weight:500;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pi-no{font-size:11px;color:var(--tx3);font-family:var(--mo)}
.pi-pr{font-size:13px;font-weight:600;font-family:var(--mo);color:var(--grn);white-space:nowrap}
.pi-mt{padding:12px;font-size:13px;color:var(--tx3);text-align:center}
/* scan */
.scan-btn{background:var(--sf3);border:1.5px solid var(--bd2);border-radius:var(--rs);
  padding:10px 14px;color:var(--tx2);font-size:13px;font-weight:600;font-family:var(--fn);
  cursor:pointer;display:flex;align-items:center;gap:6px}
.scan-btn:active{border-color:var(--red);color:var(--red)}
.scan-st{display:none;font-size:12px;color:var(--amb);align-items:center;gap:6px;padding:4px 0}
.scan-st.on{display:flex}
@keyframes pu{0%,100%{opacity:1}50%{opacity:.3}}
.sdot{width:7px;height:7px;background:var(--amb);border-radius:50%;animation:pu 1s infinite;flex-shrink:0}
/* totals */
.tot{background:var(--sf);border-top:2px solid var(--bd2);padding:16px;flex-shrink:0}
.ttr{display:flex;justify-content:space-between;align-items:center;padding:8px 0}
.ttl{font-size:13px;color:var(--tx2);display:flex;align-items:center;gap:8px}
.tv{font-size:13px;font-family:var(--mo);color:var(--tx2)}
.tog{position:relative;width:40px;height:23px;display:inline-block;cursor:pointer}
.tog input{display:none}
.tog-t{position:absolute;inset:0;background:var(--sf3);border-radius:12px;border:1px solid var(--bd2);transition:background .2s}
.tog-th{position:absolute;top:3px;left:3px;width:17px;height:17px;background:var(--tx3);border-radius:50%;transition:transform .2s,background .2s}
.tog input:checked~.tog-t{background:var(--red);border-color:var(--red)}
.tog input:checked~.tog-t .tog-th{transform:translateX(17px);background:#fff}
.tdiv{border:none;border-top:1px solid var(--bd);margin:4px 0}
.trow{display:flex;justify-content:space-between;align-items:center;padding:5px 0}
.tlbl{font-size:13px;color:var(--tx2)}
.tamt{font-size:13px;font-family:var(--mo)}
.trow.fin .tlbl{font-size:17px;font-weight:700;color:var(--tx)}
.trow.fin .tamt{font-size:21px;font-weight:700;font-family:var(--mo)}
/* modal */
.ovl{position:fixed;inset:0;background:rgba(0,0,0,.78);z-index:400;display:none;align-items:flex-end;justify-content:center}
.ovl.on{display:flex;animation:fdi .15s ease}
@keyframes fdi{from{opacity:0}to{opacity:1}}
.modal{background:var(--sf);border-top:2px solid var(--bd2);border-radius:20px 20px 0 0;width:100%;
  max-width:480px;max-height:88vh;overflow-y:auto;padding:20px 16px calc(24px + env(safe-area-inset-bottom));
  animation:slu .2s ease}
@keyframes slu{from{transform:translateY(40px);opacity:0}to{transform:translateY(0);opacity:1}}
.mt{font-size:19px;font-weight:700;margin-bottom:4px}
.ms{font-size:13px;color:var(--tx2);margin-bottom:16px;line-height:1.5}
.mf{display:flex;flex-direction:column;gap:10px;margin-bottom:16px}
.mlbl{font-size:11px;color:var(--tx3);font-weight:500;margin-bottom:4px}
.mi{width:100%;background:var(--sf2);border:1.5px solid var(--bd2);border-radius:var(--rs);
  padding:11px 13px;color:var(--tx);font-family:var(--fn);font-size:14px;outline:none;
  transition:border-color .15s;-webkit-appearance:none}
.mi:focus{border-color:var(--red)}
.mi::placeholder{color:var(--tx3)}
.mi option{background:var(--sf)}
.mr{display:flex;gap:8px}
.mr .mi{flex:1}
.mb{display:flex;gap:8px;padding-top:4px}
.mc-btn{flex:1;background:var(--sf2);border:1px solid var(--bd2);border-radius:var(--rs);
  padding:13px;color:var(--tx2);font-size:15px;font-family:var(--fn);cursor:pointer}
.mc-btn:active{opacity:.7}
.mo-btn{flex:2;background:var(--red);border:none;border-radius:var(--rs);padding:13px;
  color:#fff;font-size:15px;font-weight:700;font-family:var(--fn);cursor:pointer}
.mo-btn:active{background:var(--red2)}
.mo-btn:disabled{opacity:.5;pointer-events:none}
.mo-btn.danger{background:#c0392b}
/* machine picker */
.mpk{padding:12px 13px;background:var(--sf2);border:1.5px solid var(--bd2);border-radius:var(--rs);
  cursor:pointer;display:flex;align-items:center;gap:10px;margin-bottom:8px}
.mpk:active{border-color:var(--red)}
.mpk-new{width:100%;padding:12px 13px;background:transparent;border:1.5px dashed var(--bd2);
  border-radius:var(--rs);cursor:pointer;display:flex;align-items:center;gap:8px;
  color:var(--red);font-size:14px;font-weight:600;font-family:var(--fn);margin-top:4px}
.mpk-new:active{opacity:.7}
.type-hdr{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--tx3);padding:10px 0 5px}
/* toast */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);
  background:var(--sf);border:1px solid var(--bd2);border-radius:var(--r);padding:11px 18px;
  font-size:14px;font-weight:500;z-index:600;transition:transform .25s cubic-bezier(.34,1.56,.64,1);
  box-shadow:0 4px 20px rgba(0,0,0,.4);color:var(--tx);white-space:nowrap}
.toast.on{transform:translateX(-50%) translateY(0)}
.toast.ok{border-color:var(--grn);color:var(--grn)}
.toast.er{border-color:var(--red);color:var(--red)}
/* FAB */
.fab{position:fixed;bottom:24px;right:16px;width:52px;height:52px;background:var(--red);border:none;
  border-radius:50%;color:#fff;font-size:26px;cursor:pointer;display:flex;align-items:center;
  justify-content:center;box-shadow:0 4px 16px rgba(232,93,58,.4);z-index:40;transition:transform .15s}
.fab:active{transform:scale(.92)}
/* empty */
.empty{text-align:center;padding:50px 20px;color:var(--tx3)}
.ei{font-size:38px;margin-bottom:10px}
.et{font-size:16px;font-weight:600;color:var(--tx2);margin-bottom:5px}
.es{font-size:13px;line-height:1.5}
@keyframes sp{to{transform:rotate(360deg)}}
.spin{width:20px;height:20px;border:2px solid var(--bd2);border-top-color:var(--red);border-radius:50%;
  animation:sp .7s linear infinite;display:inline-block;margin-bottom:10px}
.loading{text-align:center;padding:40px;color:var(--tx3);font-size:13px}
/* WO list */
.woc{background:var(--sf);border:1.5px solid var(--bd2);border-radius:var(--r);padding:13px 14px;
  cursor:pointer;display:flex;align-items:flex-start;gap:12px;transition:border-color .15s;margin-bottom:8px}
.woc:active{border-color:var(--red);background:var(--sf2)}
.woc.urg{border-left:3px solid var(--red);padding-left:12px}
.ws{width:10px;height:10px;border-radius:50%;margin-top:4px;flex-shrink:0}
.wm{flex:1;min-width:0}
.wtop{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:3px}

<!-- ═══════════ SCREEN: WO LIST ═══════════ -->
<div class="scr on" id="S_list">

      <button class="back" onclick="backFromWO()">← WOs</button>

<script>
// ─────────────────────────────────────────
// CONFIG
// ─────────────────────────────────────────
const SU = 'https://ddxjszzceaullxheejnq.supabase.co';
const SK = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRkeGpzenpjZWF1bGx4aGVlam5xIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI1MjAxMzMsImV4cCI6MjA4ODA5NjEzM30.NKeWZamEDPjXx_JprE6xwdKKchNKED6P3x9-tMXooz8';
const H = {'apikey':SK,'Authorization':'Bearer '+SK,'Content-Type':'application/json','Accept':'application/json'};

// ─────────────────────────────────────────
// STATE
// ─────────────────────────────────────────
let wos=[], custs=[], equips=[], inv=[];
let cMap={}, eMap={};         // id → object
let activeF='all', activeCat='All';
// WO detail
let woId=null, selCust=null, woSt='New', mcs=[];
let prevInvParts={}; // inv_id -> qty already committed on this WO
// Customer / Equipment
let curCustId=null, curEqId=null, prevScr='S_list';
// Inventory
let expInvId=null;
// Reconcile
let rItems=[], rIdx=0, rQty=0;

// ─────────────────────────────────────────
// DB
// ─────────────────────────────────────────
async function get(t,q=''){const r=await fetch(SU+'/rest/v1/'+t+q,{headers:H});if(!r.ok)throw new Error(await r.text());return r.json();}
async function post(t,d){const r=await fetch(SU+'/rest/v1/'+t,{method:'POST',headers:{...H,Prefer:'return=representation'},body:JSON.stringify(d)});if(!r.ok)throw new Error(await r.text());return r.json();}
async function patch(t,d,q){const r=await fetch(SU+'/rest/v1/'+t+q,{method:'PATCH',headers:{...H,Prefer:'return=representation'},body:JSON.stringify(d)});if(!r.ok)throw new Error(await r.text());return r.json();}
async function del(t,q){const r=await fetch(SU+'/rest/v1/'+t+q,{method:'DELETE',headers:H});if(!r.ok)throw new Error(await r.text());}

// ─────────────────────────────────────────
// INIT
// ─────────────────────────────────────────
async function init(){
  document.getElementById('schedDate').value=new Date().toISOString().split('T')[0];
  try{
    [wos,custs,equips,inv]=await Promise.all([
      get('work_orders','?order=created_at.desc&limit=300'),
      get('customers','?order=name&limit=500'),
      get('equipment','?order=make&limit=500'),
      get('inventory','?order=name&limit=1000')
    ]);
    custs.forEach(c=>cMap[c.id]=c);
    equips.forEach(e=>eMap[e.id]=e);
    counts(); renderList();
  }catch(e){
    document.getElementById('listBody').innerHTML='<div class="empty"><div class="ei">⚠️</div><div class="et">Connection error</div><div class="es">'+e.message+'</div></div>';
  }
}

// ─────────────────────────────────────────
// THEME
// ─────────────────────────────────────────
function toggleTheme(){
  const l=document.documentElement.classList.toggle('light');
  document.querySelectorAll('.ibtn').forEach(b=>{if(b.textContent.trim()==='☀️'||b.textContent.trim()==='🌙')b.textContent=l?'🌙':'☀️';});
  localStorage.setItem('dg_t',l?'l':'d');
}
if(localStorage.getItem('dg_t')==='l'){
  document.documentElement.classList.add('light');
  document.querySelectorAll('.ibtn').forEach(b=>{if(b.textContent.trim()==='☀️')b.textContent='🌙';});
}

// ─────────────────────────────────────────
// SCREEN NAVIGATION
// ─────────────────────────────────────────
function S(id){document.querySelectorAll('.scr').forEach(s=>s.classList.remove('on'));document.getElementById(id).classList.add('on');window.scrollTo(0,0);}

// ─────────────────────────────────────────
// STATUS HELPERS
// ─────────────────────────────────────────
const SM={'new':'New','looked at':'Looked At','parts ordered':'Parts Ordered','parts in':'Parts In','parts received':'Parts In','done':'Done','completed':'Done','invoiced':'Invoiced','billed':'Invoiced'};
function cs(s){return SM[(s||'').toLowerCase()]||(s||'New');}
function sc(s){const c=cs(s);return c==='New'?'sN':c==='Looked At'?'sL':c==='Parts Ordered'?'sPO':c==='Parts In'?'sPI':c==='Done'?'sD':c==='Invoiced'?'sI':'sO';}
function sco(s){const c=cs(s);return c==='New'?'var(--red)':c==='Looked At'?'var(--blu)':c==='Parts Ordered'?'var(--amb)':c==='Parts In'?'var(--pur)':(c==='Done'||c==='Invoiced')?'var(--grn)':'var(--tx3)';}

// ─────────────────────────────────────────
// WO LIST
// ─────────────────────────────────────────
function counts(){
  const c={all:wos.length,New:0,'Looked At':0,'Parts Ordered':0,'Parts In':0,Done:0,Invoiced:0};
  wos.forEach(w=>{const s=cs(w.status);if(c[s]!==undefined)c[s]++;});
  document.getElementById('f_all').textContent=c.all;
  document.getElementById('f_New').textContent=c['New'];
  document.getElementById('f_LA').textContent=c['Looked At'];
  document.getElementById('f_PO').textContent=c['Parts Ordered'];
  document.getElementById('f_PI').textContent=c['Parts In'];
  document.getElementById('f_Do').textContent=c['Done'];
  document.getElementById('f_In').textContent=c['Invoiced'];
}
function setF(btn){document.querySelectorAll('.fchip').forEach(c=>c.classList.remove('on'));btn.classList.add('on');activeF=btn.dataset.f;renderList();}
function renderList(){
  const q=(document.getElementById('lsrch').value||'').toLowerCase();
  let list=wos;
  if(activeF!=='all')list=list.filter(w=>cs(w.status)===activeF);
  if(q)list=list.filter(w=>{
    const c=cMap[w.customer_id],e=eMap[w.equipment_id];
    return(c&&c.name.toLowerCase().includes(q))||(e&&(e.make||'').toLowerCase().includes(q))||(e&&(e.model||'').toLowerCase().includes(q))||(w.problem||'').toLowerCase().includes(q);
  });
  const el=document.getElementById('listBody');
  if(!list.length){el.innerHTML='<div class="empty"><div class="ei">📋</div><div class="et">No work orders</div><div class="es">'+( activeF!=='all'?'None with status "'+activeF+'"':'Tap + New WO to get started')+'</div></div>';return;}
  const act=list.filter(w=>!['Done','Invoiced'].includes(cs(w.status)));
  const done=list.filter(w=>['Done','Invoiced'].includes(cs(w.status)));
  let h='';
  if(act.length){if(activeF==='all')h+='<div class="shdr">Active ('+act.length+')</div>';act.forEach(w=>h+=woCard(w));}
  if(done.length){if(activeF==='all')h+='<div class="shdr">Completed / invoiced ('+done.length+')</div>';done.forEach(w=>h+=woCard(w));}
  el.innerHTML=h;
}
function woCard(w){
  const c=cMap[w.customer_id],e=eMap[w.equipment_id],s=cs(w.status);
  let mach=e?[e.make,e.model].filter(Boolean).join(' ')+(e.equipment_type?' · '+e.equipment_type:''):'';
  try{const ex=JSON.parse(w.extra_equipment_ids||'[]');if(ex.length)mach+=' +'+ex.length+' more';}catch(x){}
  const dt=fd(w.scheduled_date||w.created_at);
  const urg=w.scheduled_date&&new Date(w.scheduled_date)<new Date()&&!['Done','Invoiced'].includes(s);
  const biz=c&&['Contractor','Commercial'].includes(c.customer_type);
  return '<div class="woc'+(urg?' urg':'')+'" onclick="openWO(\''+w.id+'\')">'+
    '<div class="ws" style="background:'+sco(w.status)+'"></div>'+
    '<div class="wm">'+
      '<div class="wtop"><div class="wcn">'+( c?c.name:'Unknown')+'</div><div class="wd">'+dt+'</div></div>'+
      (mach?'<div class="wmach">'+mach+'</div>':'')+
      '<div class="wpr">'+(w.problem||'<em style="color:var(--tx3)">No description</em>')+'</div>'+
      '<div class="wbdg">'+
        '<span class="wb '+sc(w.status)+'">'+s+'</span>'+
        (biz?'<span class="wb biz">'+c.customer_type+'</span>':'')+
        (w.invoice_status==='unbilled'&&s==='Done'?'<span class="wb unb">Unbilled</span>':'')+
        (w.customer_id?'<span class="wb cust" onclick="event.stopPropagation();goToCust(\''+w.customer_id+'\')">👤 Customer</span>':'')+
      '</div>'+
    '</div></div>';
}
function fd(d){if(!d)return'';const dt=new Date(d),now=new Date(),df=Math.round((dt-now)/86400000);if(df===0)return'Today';if(df===1)return'Tomorrow';if(df===-1)return'Yesterday';return dt.toLocaleDateString('en-US',{month:'short',day:'numeric'});}
async function refreshList(){try{wos=await get('work_orders','?order=created_at.desc&limit=300');counts();renderList();}catch(e){}}

// ─────────────────────────────────────────
// WO DETAIL
// ─────────────────────────────────────────
async function openWO(id){
  woId=id;selCust=null;woSt='New';mcs=[];
  document.getElementById('wo_title').textContent=id?'Work Order':'New Work Order';
  document.getElementById('wo_sub').textContent=id?'#'+id.slice(0,8).toUpperCase():'unsaved';
  document.getElementById('descInput').value='';
  document.getElementById('schedDate').value=new Date().toISOString().split('T')[0];
  document.getElementById('locSel').value='';
  document.getElementById('taxTog').checked=true;
  document.getElementById('ccTog').checked=false;
  document.getElementById('addMcBtn').disabled=true;
  document.getElementById('delWOBtn').style.display=id?'flex':'none';
  document.getElementById('invWOBtn').style.display=id?'flex':'none';
  prevInvParts={};
  resetCustArea();
  setStBy('New');
  renderMcs();recalc();
  S('S_wo');
  if(id){
    try{
      const [w]=await get('work_orders','?id=eq.'+id);
      if(!w)return;
      document.getElementById('descInput').value=w.problem||'';
      document.getElementById('schedDate').value=w.scheduled_date||'';
      document.getElementById('locSel').value=w.location||'';
      setStBy(cs(w.status));
      if(w.customer_id){const c=custs.find(c=>c.id===w.customer_id);if(c){selCust=c;renderCustSel(c);document.getElementById('addMcBtn').disabled=false;}}
      const md=JSON.parse(w.machines_data||'{}');
      const ex=JSON.parse(w.extra_equipment_ids||'[]');
      const ids=w.equipment_id?[w.equipment_id,...ex]:ex;
      ids.forEach(eid=>{const eq=equips.find(e=>e.id===eid)||eMap[eid];if(!eq)return;const d=md[eid]||{};mcs.push({id:eid,make:eq.make||'',model:eq.model||'',serial:eq.serial||'',type:eq.equipment_type||'',open:true,labor:d.labor||[],parts:(d.parts||[]).map(p=>({...p,inv_id:p.inv_id||null}))});});
      // snapshot inv parts already on this WO so re-save doesn't double-deduct
      prevInvParts={};
      mcs.forEach(m=>{(m.parts||[]).forEach(p=>{if(p.inv_id)prevInvParts[p.inv_id]=(prevInvParts[p.inv_id]||0)+p.qty;});});
      renderMcs();recalc();
    }catch(e){toast('Error loading WO','er');}
  }
}
function backFromWO(){S('S_list');refreshList();}

// customer area
function resetCustArea(){
  document.getElementById('custArea').innerHTML=
    '<div class="sw" style="position:relative"><input class="sinp" id="csinp" placeholder="Search by name or phone…" autocomplete="off" oninput="onCS(this.value)" onfocus="onCS(this.value)"><span class="sico">⌕</span><div class="dd" id="csdd" style="display:none"></div></div>';
}
function onCS(q){
  const dd=document.getElementById('csdd');
  const hits=custs.filter(c=>c.name.toLowerCase().includes(q.toLowerCase())||(c.phone||'').includes(q)).slice(0,9);
  let h=hits.map(c=>'<div class="ddi" onclick="pickCust(\''+c.id+'\')"><div class="ddi-n">'+hl(c.name,q)+'</div><div class="ddi-s">'+(c.customer_type||'Residential')+' · '+(c.phone||'no phone')+'</div></div>').join('');
  if(!hits.length)h='<div class="dd-mt">No match'+(q?' for "'+q+'"':'')+'</div>';
  h+='<div class="dd-add" onclick="addCust()">+ Add new customer</div>';
  dd.innerHTML=h;dd.style.display='block';
}
function hl(s,q){if(!q)return s;return s.replace(new RegExp('('+q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','gi'),'<strong style="color:var(--red)">$1</strong>');}
function pickCust(id){const c=custs.find(c=>c.id===id);if(c){selCust=c;renderCustSel(c);document.getElementById('taxTog').checked=!c.tax_exempt;document.getElementById('addMcBtn').disabled=false;}const dd=document.getElementById('csdd');if(dd)dd.style.display='none';recalc();}
function renderCustSel(c){
  const biz=['Contractor','Commercial'].includes(c.customer_type);
  document.getElementById('custArea').innerHTML=
    '<div class="csel" onclick="clearCust()">'+
    '<div class="cav">'+c.name.charAt(0).toUpperCase()+'</div>'+
    '<div style="flex:1;min-width:0"><div class="cnm">'+c.name+'</div><div class="cmt">'+(c.phone||'')+( c.email?' · '+c.email:'')+'</div></div>'+
    '<span class="badge '+(biz?'biz':'')+'">'+( c.customer_type||'Residential')+'</span>'+
    (c.tax_exempt?'<span class="badge exmt">Tax Exempt</span>':'')+
    '<span style="font-size:18px;color:var(--tx3)">✕</span></div>';
}
function clearCust(){selCust=null;mcs=[];document.getElementById('addMcBtn').disabled=true;resetCustArea();renderMcs();recalc();}
document.addEventListener('click',e=>{const dd=document.getElementById('csdd');const inp=document.getElementById('csinp');if(dd&&!dd.contains(e.target)&&e.target!==inp)dd.style.display='none';});

// status
function setStatus(btn){document.querySelectorAll('.chip').forEach(c=>c.classList.remove('on'));btn.classList.add('on');woSt=btn.dataset.s;}
function setStBy(s){document.querySelectorAll('.chip').forEach(c=>c.classList.toggle('on',c.dataset.s===s));woSt=s;}

// machine icons
const ET=['Stand-on Mower','Zero-turn Mower','Walk-behind Mower','Riding Mower','Snowblower','Trimmer','Blower','Chainsaw','Pressure Washer','Generator','Aerator','Dethatcher','Other'];
function eico(t){if(!t)return'⚙️';const l=t.toLowerCase();if(l.includes('walk')||l.includes('stand')||l.includes('zero')||l.includes('mow'))return'🌿';if(l.includes('snow'))return'❄️';if(l.includes('trim'))return'🌱';if(l.includes('blow'))return'💨';if(l.includes('chain'))return'🪵';if(l.includes('tractor')||l.includes('rider'))return'🚜';if(l.includes('pressure')||l.includes('wash'))return'💧';return'⚙️';}

// render machines
function renderMcs(){
  const el=document.getElementById('mcList');
  if(!mcs.length){el.innerHTML='<div style="text-align:center;padding:20px 0;color:var(--tx3);font-size:13px">'+(selCust?'No machines yet — tap + Add Machine':'Select a customer first, then add machines')+'</div>';recalc();return;}
  el.innerHTML=mcs.map((m,i)=>{
    const lt=m.labor.reduce((s,l)=>s+l.hours*l.rate,0),pt=m.parts.reduce((s,p)=>s+p.qty*p.price,0),sub=lt+pt;
    return '<div class="mc '+(i===0?'pri':'')+'" id="mc_'+i+'">'+
      '<div class="mc-hd" onclick="togMc('+i+')">'+
        '<div class="mc-ico">'+eico(m.type)+'</div>'+
        '<div class="mc-inf"><div class="mc-nm">'+m.make+' '+(m.model||'')+'</div><div class="mc-sn">SN: '+(m.serial||'—')+' · '+(m.type||'Equipment')+'</div></div>'+
        '<div class="mc-rt">'+
          (sub>0?'<span class="mc-amt">$'+sub.toFixed(2)+'</span>':'')+
          '<button class="mc-rm" onclick="rmMc(event,'+i+')">✕</button>'+
          '<span class="mc-cv '+(m.open?'op':'')+'">▼</span>'+
        '</div>'+
      '</div>'+
      (m.open?
      '<div class="mc-bd">'+
        '<div><div class="sublbl">Labor</div><div class="lil">'+
          m.labor.map((l,li)=>'<div class="li"><div style="flex:1;min-width:0"><div class="li-d">'+l.desc+'</div><div class="li-s">'+l.hours+'h × $'+l.rate+'/hr</div></div><div class="li-a">$'+(l.hours*l.rate).toFixed(2)+'</div><button class="li-rm" onclick="rmLabor('+i+','+li+')">✕</button></div>').join('')+

function recalc(){
  let p=0,l=0;mcs.forEach(m=>{m.labor.forEach(x=>l+=x.hours*x.rate);m.parts.forEach(x=>p+=x.qty*x.price);});
  const sub=p+l,tax=document.getElementById('taxTog').checked?sub*0.08625:0,cc=document.getElementById('ccTog').checked?(sub+tax)*0.03:0;
  document.getElementById('tParts').textContent='$'+p.toFixed(2);
  document.getElementById('tLabor').textContent='$'+l.toFixed(2);
  document.getElementById('tSub').textContent='$'+sub.toFixed(2);
  document.getElementById('taxAmt').textContent='$'+tax.toFixed(2);
  document.getElementById('ccAmt').textContent='$'+cc.toFixed(2);
  document.getElementById('tTotal').textContent='$'+(sub+tax+cc).toFixed(2);
}

async function saveWO(){
  if(!selCust){toast('Select a customer first','er');return;}
  const btn=document.getElementById('saveBtn');btn.disabled=true;btn.textContent='Saving…';
  const md={};mcs.forEach(m=>{md[m.id]={labor:m.labor,parts:m.parts};});
  const pay={customer_id:selCust.id,equipment_id:mcs.length?mcs[0].id:null,extra_equipment_ids:JSON.stringify(mcs.length>1?mcs.slice(1).map(m=>m.id):[]),machines_data:JSON.stringify(md),status:woSt,problem:document.getElementById('descInput').value.trim()||null,scheduled_date:document.getElementById('schedDate').value||null,location:document.getElementById('locSel').value||null};
  try{
    if(woId){await patch('work_orders',pay,'?id=eq.'+woId);toast('Saved ✓','ok');}
    else{const [w]=await post('work_orders',pay);if(w&&w.id){woId=w.id;document.getElementById('wo_title').textContent='Work Order';document.getElementById('wo_sub').textContent='#'+woId.slice(0,8).toUpperCase();document.getElementById('delWOBtn').style.display='flex';toast('WO created ✓','ok');}}
    wos=await get('work_orders','?order=created_at.desc&limit=300');counts();
    // ── inventory deduction ──
    // tally current inv parts on this WO
    const curInvParts={};
    mcs.forEach(m=>{(m.parts||[]).forEach(p=>{if(p.inv_id)curInvParts[p.inv_id]=(curInvParts[p.inv_id]||0)+p.qty;});});
    // all inv_ids touched (new + removed)
    const allIds=new Set([...Object.keys(curInvParts),...Object.keys(prevInvParts)]);
    for(const id of allIds){
      const cur=curInvParts[id]||0, prev=prevInvParts[id]||0, delta=cur-prev;
      if(delta===0)continue;
      const item=inv.find(x=>x.id===id);if(!item)continue;
      const newQty=Math.max(0,parseFloat(item.qty_on_hand||0)-delta);
      const newSold=parseFloat(item.sold_qty||0)+(delta>0?delta:0);
      await patch('inventory',{qty_on_hand:newQty,sold_qty:newSold},'?id=eq.'+id);
      item.qty_on_hand=newQty;item.sold_qty=newSold;
    }
    // update snapshot for next save
    prevInvParts={...curInvParts};
  }catch(e){toast('Save failed: '+e.message,'er');}
  btn.disabled=false;btn.textContent='Save';
}

async function confirmDelWO(){
  closeM();
  try{
    // restore inventory for all parts on this WO
    for(const [id,qty] of Object.entries(prevInvParts)){
      const item=inv.find(x=>x.id===id);if(!item)continue;
      const newQty=parseFloat(item.qty_on_hand||0)+qty;
      const newSold=Math.max(0,parseFloat(item.sold_qty||0)-qty);
      await patch('inventory',{qty_on_hand:newQty,sold_qty:newSold},'?id=eq.'+id);
      item.qty_on_hand=newQty;item.sold_qty=newSold;
    }
    await del('work_orders','?id=eq.'+woId);wos=wos.filter(w=>w.id!==woId);toast('Deleted','ok');backFromWO();
  }catch(e){toast('Delete failed','er');}
}

function autoCat(name){const n=(name||'').toLowerCase();if(n.includes('air filter'))return'Air Filter';if(n.includes('fuel filter'))return'Fuel Filter';if(n.includes('belt'))return'Belt';if(n.includes('blade'))return'Blade';if(n.includes('spark plug')||n.includes(' plug'))return'Spark Plug';if(n.includes('oil')||n.includes('10w')||n.includes('5w'))return'Oil';if(n.includes('cable'))return'Cable';if(n.includes('bearing'))return'Bearing';if(n.includes('battery')||n.includes('coil')||n.includes('starter')||n.includes('solenoid'))return'Electrical';return'Misc';}
function setCat(btn){document.querySelectorAll('.ccat').forEach(c=>c.classList.remove('on'));btn.classList.add('on');activeCat=btn.dataset.c;expInvId=null;renderInv();}

  const q=(document.getElementById('isrch').value||'').toLowerCase().trim();

  if(q)items=items.filter(p=>(p.name||'').toLowerCase().includes(q)||(p.part||'').toLowerCase().includes(q)||(p.oem||'').toLowerCase().includes(q)||(p.stens_num||'').toLowerCase().includes(q)||(p.rotary_num||'').toLowerCase().includes(q)||(p.description||'').toLowerCase().includes(q));

  const low=inv.filter(p=>{const q=parseFloat(p.qty_on_hand||0),m=p.min_stock||0;return m>0&&q<=m;});

  const qty=parseFloat(document.getElementById('iq_'+id).textContent||0);
  const sell=parseFloat(document.getElementById('isl_'+id).value)||0;
  const data={name:document.getElementById('inm_'+id).value.trim(),category:document.getElementById('ict_'+id).value,cost:parseFloat(document.getElementById('ics_'+id).value)||0,sell_price:sell,sell,min_stock:parseInt(document.getElementById('imn_'+id).value)||0,oem:document.getElementById('iom_'+id).value.trim(),part:document.getElementById('iom_'+id).value.trim(),stens_num:document.getElementById('ist_'+id).value.trim(),rotary_num:document.getElementById('irt_'+id).value.trim(),oregon_num:document.getElementById('ior_'+id).value.trim(),qty_on_hand:qty};
  try{await patch('inventory',data,'?id=eq.'+id);const i=inv.findIndex(x=>x.id===id);if(i>=0)inv[i]={...inv[i],...data};expInvId=null;renderInv();toast('Saved ✓','ok');}
  catch(e){toast('Save failed: '+e.message,'er');if(btn){btn.disabled=false;btn.textContent='Save changes';}}
}
async function delInv(id){
  openM('<div class="mt" style="color:var(--red)">Delete this part?</div><div class="ms">This will permanently remove it from inventory.</div><div class="mb"><button class="mc-btn" onclick="closeM()">Cancel</button><button class="mo-btn danger" onclick="confirmDelInv(\''+id+'\')">Delete</button></div>');
}
async function confirmDelInv(id){closeM();try{await del('inventory','?id=eq.'+id);inv=inv.filter(x=>x.id!==id);expInvId=null;renderInv();toast('Deleted','ok');}catch(e){toast('Delete failed','er');}}
function showLow(){
  const low=inv.filter(p=>{const q=parseFloat(p.qty_on_hand||0),m=p.min_stock||0;return m>0&&q<=m;});
  const el=document.getElementById('invBody');
  let h='<div style="display:flex;align-items:center;justify-content:space-between;padding:4px 0 8px"><span style="font-size:12px;color:var(--amb);font-weight:600">'+low.length+' low/out items</span><span style="font-size:12px;color:var(--tx3);cursor:pointer" onclick="renderInv()">Show all ✕</span></div>';
  low.forEach(p=>{const qty=parseFloat(p.qty_on_hand||0),sell=parseFloat(p.sell_price||p.sell||0),isExp=expInvId===p.id;h+='<div class="icard lo" id="ic_'+p.id+'"><div class="ic-row" onclick="togInv(\''+p.id+'\')"><div style="flex:1;min-width:0"><div class="ic-nm">'+(p.name||'Unnamed')+'</div></div><span class="qb '+(qty===0?'ou':'wa')+'">'+qty+'</span><div style="text-align:right"><div class="ic-pr">$'+sell.toFixed(2)+'</div></div></div>'+(isExp?buildIE(p):'')+'</div>';});
  el.innerHTML=h;
}
function addInvItem(){
  openM('<div class="mt">New inventory item</div><div class="mf"><div><div class="mlbl">Name *</div><input class="mi" id="ai_nm" placeholder="Part name"></div><div class="mr"><div style="flex:1"><div class="mlbl">Category</div><select class="mi" id="ai_ct"><option>Air Filter</option><option>Fuel Filter</option><option>Belt</option><option>Blade</option><option>Spark Plug</option><option>Oil</option><option>Electrical</option><option>Cable</option><option>Bearing</option><option selected>Misc</option></select></div><div style="flex:1"><div class="mlbl">Qty</div><input class="mi" id="ai_qty" type="number" min="0" value="0"></div></div><div class="mr"><div style="flex:1"><div class="mlbl">Cost</div><input class="mi" id="ai_cs" type="number" step="0.01" placeholder="0.00"></div><div style="flex:1"><div class="mlbl">Sell price</div><input class="mi" id="ai_sl" type="number" step="0.01" placeholder="0.00"></div></div><div><div class="mlbl">OEM / Part #</div><input class="mi" id="ai_om" placeholder="Part number"></div><div class="mr"><div style="flex:1"><div class="mlbl">Stens #</div><input class="mi" id="ai_st" placeholder=""></div><div style="flex:1"><div class="mlbl">Rotary #</div><input class="mi" id="ai_rt" placeholder=""></div></div></div><div class="mb"><button class="mc-btn" onclick="closeM()">Cancel</button><button class="mo-btn" id="aiOk" onclick="saveNewInv()">Add item</button></div>');
  setTimeout(()=>{const el=document.getElementById('ai_nm');if(el)el.focus();},150);
}
async function saveNewInv(){
  const name=(document.getElementById('ai_nm').value||'').trim();if(!name){toast('Name required','er');return;}
  const btn=document.getElementById('aiOk');btn.disabled=true;btn.textContent='Saving…';
  const sell=parseFloat(document.getElementById('ai_sl').value)||0;
  try{const [item]=await post('inventory',{name,category:document.getElementById('ai_ct').value,qty_on_hand:parseFloat(document.getElementById('ai_qty').value)||0,cost:parseFloat(document.getElementById('ai_cs').value)||0,sell_price:sell,sell,oem:document.getElementById('ai_om').value.trim(),part:document.getElementById('ai_om').value.trim(),stens_num:document.getElementById('ai_st').value.trim(),rotary_num:document.getElementById('ai_rt').value.trim(),min_stock:0,sold_qty:0});
    if(item&&item.id){inv.push(item);inv.sort((a,b)=>(a.name||'').localeCompare(b.name||''));closeM();expInvId=item.id;renderInv();toast('Item added ✓','ok');}
  }catch(e){toast('Save failed: '+e.message,'er');btn.disabled=false;btn.textContent='Add item';}
}

// ─────────────────────────────────────────
// RECONCILE
// ─────────────────────────────────────────
function startRecon(){
  const q=(document.getElementById('isrch').value||'').toLowerCase();
  rItems=inv.filter(p=>activeCat==='All'||(p.category||autoCat(p.name))===activeCat).filter(p=>!q||(p.name||'').toLowerCase().includes(q));
  if(!rItems.length){toast('No items to count','er');return;}
  rIdx=0;showRItem();document.getElementById('reconOvl').classList.add('on');
}
function showRItem(){
  if(rIdx>=rItems.length){exitRecon();toast('Stock count done — '+rItems.length+' items reviewed','ok');return;}
  const p=rItems[rIdx];rQty=parseFloat(p.qty_on_hand||0);
  document.getElementById('reconProg').textContent=(rIdx+1)+' of '+rItems.length;
  document.getElementById('reconNm').textContent=p.name||'Unnamed';
  const nums=[p.part||p.oem,p.stens_num,p.rotary_num].filter(Boolean).map(n=>'#'+n).join(' · ');
  document.getElementById('reconNum').textContent=nums||'';
  document.getElementById('reconCur').textContent='System says: '+rQty+' in stock';
  document.getElementById('reconQ').textContent=rQty%1===0?rQty:rQty.toFixed(1);
}
function rAdj(d){rQty=Math.max(0,rQty+d);document.getElementById('reconQ').textContent=rQty%1===0?rQty:rQty.toFixed(1);}
async function rNext(save){
  if(save){const p=rItems[rIdx];try{await patch('inventory',{qty_on_hand:rQty},'?id=eq.'+p.id);const i=inv.findIndex(x=>x.id===p.id);if(i>=0)inv[i].qty_on_hand=rQty;}catch(e){toast('Save failed','er');}}
  rIdx++;showRItem();
}
function exitRecon(){document.getElementById('reconOvl').classList.remove('on');renderInv();}

// ─────────────────────────────────────────
// MODAL & TOAST
// ─────────────────────────────────────────
function openM(h){document.getElementById('mC').innerHTML=h;document.getElementById('ovl').classList.add('on');}
function closeM(){document.getElementById('ovl').classList.remove('on');}
function onOvl(e){if(e.target===document.getElementById('ovl'))closeM();}
let tt;
function toast(msg,type=''){const t=document.getElementById('toast');t.textContent=msg;t.className='toast on'+(type?' '+type:'');clearTimeout(tt);tt=setTimeout(()=>t.classList.remove('on'),2600);}

// ─────────────────────────────────────────
// SCHEDULE
// ─────────────────────────────────────────
function openSched(){
  S('S_sched');
  var el=document.getElementById('schedBody');
  if(el)el.innerHTML='<div class="loading"><div class="spin"></div><br>Loading schedule\u2026</div>';
  setTimeout(renderSched,100);
}
function renderSched(){
  var el=document.getElementById('schedBody');
  if(!el){alert('no schedBody element!');return;}
  var h='<div style="padding:16px">';
  h+='<div style="font-size:14px;color:var(--tx2);margin-bottom:12px">Total WOs loaded: '+wos.length+'</div>';
  var shown=0;
  wos.forEach(function(w){
    var raw=(w.status||'').toLowerCase();
    if(raw==='invoiced'||raw==='billed')return;
    shown++;
    var c=cMap[w.customer_id];
    h+='<div class="woc" data-wid="'+w.id+'" onclick="openWO(this.dataset.wid)">';
    h+='<div class="ws" style="background:'+sco(w.status)+'"></div>';
    h+='<div class="wm">';
    h+='<div class="wtop"><div class="wcn">'+(c?c.name:'Unknown')+'</div>';
    h+='<div class="wd">'+(w.scheduled_date||'No date')+'</div></div>';
    h+='<div class="wpr">'+(w.problem||'No description')+'</div>';
    h+='<div class="wbdg"><span class="wb '+sc(w.status)+'">'+cs(w.status)+'</span></div>';
    h+='</div></div>';
  });
  if(!shown)h+='<div style="color:var(--tx3);font-size:13px">No open work orders ('+wos.length+' total, all invoiced/billed)</div>';
  h+='</div>';
  el.innerHTML=h;
}

function schedWoCard(w){
  var c=cMap[w.customer_id],e=eMap[w.equipment_id];
  var mach=e?e.make+' '+(e.model||''):'';
  var h='<div class="woc" data-wid="'+w.id+'" onclick="openWO(this.dataset.wid)">';
  h+='<div class="ws" style="background:'+sco(w.status)+'"></div>';
  h+='<div class="wm">';
  h+='<div class="wtop"><div class="wcn">'+(c?c.name:'Unknown')+'</div></div>';
  if(mach)h+='<div class="wmach">'+mach+'</div>';
  h+='<div class="wpr">'+(w.problem||'<em style="color:var(--tx3)">No description</em>')+'</div>';
  h+='<div class="wbdg"><span class="wb '+sc(w.status)+'">'+cs(w.status)+'</span>'+(w.location?'<span class="wb sO">'+w.location+'</span>':'')+'</div>';
  h+='</div></div>';
  return h;
}

// ─────────────────────────────────────────
// INVOICE
// ─────────────────────────────────────────
let invWoId = null;

async function openInvoice(id) {
  invWoId = id;
  S('S_inv_view');
  document.getElementById('invViewBody').innerHTML = '<div class="loading"><div class="spin"></div><br>Building invoice…</div>';
  document.getElementById('invActions').innerHTML = '';
  try {
    const [w] = await get('work_orders', '?id=eq.' + id);
    if (!w) return;
    const c = cMap[w.customer_id] || {};
    const isPaid = w.invoice_status === 'paid' || w.status === 'Invoiced';
    const biz = ['Contractor','Commercial'].includes(c.customer_type);
    const invNum = 'INV-' + (w.id || '').slice(0,8).toUpperCase();
    const today = new Date().toLocaleDateString('en-US', {month:'long',day:'numeric',year:'numeric'});
    const dueDate = biz ? 'Net 7 days' : 'Due on receipt';

    // Parse machines data
    let md = {};
    try { md = JSON.parse(w.machines_data || '{}'); } catch(e) {}
    const ex = JSON.parse(w.extra_equipment_ids || '[]');
    const ids = w.equipment_id ? [w.equipment_id, ...ex] : ex;

    let parts = 0, labor = 0;
    let machinesHtml = '';
    ids.forEach(eid => {
      const eq = eMap[eid];
      if (!eq) return;
      const d = md[eid] || {};
      const ps = d.parts || [], ls = d.labor || [];
      const pt = ps.reduce((s,p) => s + p.qty * p.price, 0);
      const lt = ls.reduce((s,l) => s + l.hours * l.rate, 0);
      parts += pt; labor += lt;
      if (!ps.length && !ls.length) return;
      machinesHtml += `<div class="inv-mach">
        <div class="inv-mach-nm">${eq.make} ${eq.model||''}<span style="font-size:11px;color:var(--tx3);font-family:var(--mo);font-weight:400"> · SN: ${eq.serial||'—'}</span></div>`;
      if (ls.length) {
        machinesHtml += `<div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--tx3);margin:6px 0 3px">Labor</div>`;
        ls.forEach(l => {
          machinesHtml += `<div class="inv-li"><span class="inv-li-d">${l.desc}</span><span class="inv-li-sub">${l.hours}h × $${l.rate}</span><span class="inv-li-a">$${(l.hours*l.rate).toFixed(2)}</span></div>`;
        });
      }
      if (ps.length) {
        machinesHtml += `<div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--tx3);margin:6px 0 3px">Parts</div>`;
        ps.forEach(p => {
          machinesHtml += `<div class="inv-li"><span class="inv-li-d">${p.name}${p.partNum?' <span style="color:var(--tx3);font-size:11px">#'+p.partNum+'</span>':''}</span><span class="inv-li-sub">qty ${p.qty} × $${p.price.toFixed(2)}</span><span class="inv-li-a">$${(p.qty*p.price).toFixed(2)}</span></div>`;
        });
      }
      machinesHtml += `</div>`;
    });

    const sub = parts + labor;
    const tax = w.machines_data ? sub * 0.08625 : 0; // use stored tax flag if available
    const taxAmt = sub * 0.08625;
    const ccAmt = sub * 0.03;
    // Re-derive tax/cc from totals stored on WO — use simple recalc
    let finalTax = 0, finalCC = 0;
    // We'll just show based on what recalc would produce
    // Use actual toggles logic: default tax on, cc off
    finalTax = sub * 0.08625;
    finalCC = 0;
    const total = sub + finalTax + finalCC;

    const html = `
      <div class="inv-card">
        <div class="inv-biz">
          <div class="inv-biz-nm">DG Equipment Repair &amp; Services</div>
          <div class="inv-biz-mt">Oceanside, NY · (516) 350-8898 · dgequipmentservices@gmail.com</div>
        </div>
        <div class="inv-meta">
          <div class="inv-meta-l">
            <div class="inv-num">Bill To</div>
            <div class="inv-val">${c.name||'Customer'}</div>
            <div>${c.phone||''}</div>
            <div style="color:var(--tx3)">${c.email||''}</div>
            ${c.address ? `<div style="color:var(--tx3)">${c.address}</div>` : ''}
          </div>
          <div class="inv-meta-r">
            <div class="inv-num">Invoice</div>
            <div class="inv-val">${invNum}</div>
            <div style="color:var(--tx3)">Date: ${today}</div>
            <div style="color:var(--tx3)">${dueDate}</div>
            <div style="margin-top:6px"><span class="wb ${w.status==='Invoiced'?'sI':'sD'}">${w.status==='Invoiced'?'Invoiced':'Done'}</span></div>
          </div>
        </div>
        ${w.problem ? `<div class="inv-sec"><div class="inv-sec-t">Job Description</div><div style="font-size:13px;color:var(--tx2);line-height:1.6">${w.problem}</div></div>` : ''}
        <div class="inv-sec">
          <div class="inv-sec-t">Work Performed</div>
          ${machinesHtml || '<div style="color:var(--tx3);font-size:13px">No line items recorded.</div>'}
        </div>
        <div class="inv-totals">
          <div class="inv-trow"><span class="l">Parts</span><span class="v">$${parts.toFixed(2)}</span></div>
          <div class="inv-trow"><span class="l">Labor</span><span class="v">$${labor.toFixed(2)}</span></div>
          <div class="inv-trow"><span class="l">Subtotal</span><span class="v">$${sub.toFixed(2)}</span></div>
          <div class="inv-trow"><span class="l">Tax (8.625%)</span><span class="v">$${finalTax.toFixed(2)}</span></div>
          <div class="inv-trow fin"><span class="l">Total Due</span><span class="v" style="color:var(--red)">$${total.toFixed(2)}</span></div>
        </div>
        ${isPaid ? '<div class="inv-paid-stamp">PAID IN FULL</div>' : ''}
        <div class="inv-disc">
          Payment due on receipt (residential) or Net 7 days (commercial). 1.5% monthly late fee after 15 days.
          30-day parts &amp; labor warranty. Warranty void if equipment misused, improperly maintained, or operated with bad/old/contaminated fuel.
          Not responsible for pre-existing conditions or failures unrelated to repairs performed.
          Equipment unclaimed after 30 days becomes the responsibility of the owner.
        </div>
      </div>
      <div style="height:20px"></div>`;

    document.getElementById('invViewBody').innerHTML = html;
    document.getElementById('inv_title').textContent = invNum;
    document.getElementById('inv_sub').textContent = c.name || '';

    // Action buttons
    let btns = `<button style="flex:1;background:var(--sf2);border:1.5px solid var(--bd2);border-radius:var(--rs);padding:13px;font-size:14px;font-weight:600;font-family:var(--fn);color:var(--tx2);cursor:pointer" onclick="window.print()">Print / PDF</button>`;
    if (!isPaid) {
      btns += `<button style="flex:2;background:var(--grn);border:none;border-radius:var(--rs);padding:13px;font-size:14px;font-weight:700;font-family:var(--fn);color:#fff;cursor:pointer" onclick="markPaid('${id}')">Mark Paid</button>`;
    } else {
      btns += `<button style="flex:2;background:var(--sf2);border:1.5px solid var(--grn);border-radius:var(--rs);padding:13px;font-size:14px;font-weight:600;font-family:var(--fn);color:var(--grn);cursor:pointer" disabled>Paid in Full</button>`;
    }
    document.getElementById('invActions').innerHTML = btns;

  } catch(e) { toast('Error loading invoice: ' + e.message, 'er'); }
}

function backFromInvoice() {
  S('S_wo');
}

async function markPaid(id) {
  try {
    await patch('work_orders', {status: 'Invoiced', invoice_status: 'paid'}, '?id=eq.' + id);
    const w = wos.find(x => x.id === id);
    if (w) { w.status = 'Invoiced'; w.invoice_status = 'paid'; }
    toast('Marked as paid ✓', 'ok');
    openInvoice(id); // refresh
  } catch(e) { toast('Failed: ' + e.message, 'er'); }
}

// START
// ─────────────────────────────────────────
init();
</script>
